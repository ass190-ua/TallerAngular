<div class="d-flex justify-content-between align-items-center p-2 border-bottom" [ngClass]="{'bg-light': miTarea.terminada}">
  <div class="form-check">
    <input class="form-check-input" type="checkbox" [(ngModel)]="miTarea.terminada" (ngModelChange)="cambiarEstado()">
    <label class="form-check-label" [ngClass]="{'text-decoration-line-through text-muted': miTarea.terminada}">
      <strong>{{ miTarea.nombre }}</strong> <br>
      <small class="text-muted">{{ miTarea.descripcion }}</small>
    </label>
  </div>
  
  <button class="btn btn-sm btn-outline-danger" (click)="borrar()">Eliminar</button>
</div>
